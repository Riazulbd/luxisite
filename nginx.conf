map $uri $redirect_path {
  "/" "";
  default $uri;
  ~^(.+)/+$ $1;
}

server {
  listen 80 default_server;
  server_name automationpaths.com www.automationpaths.com _;

  if ($host = "www.automationpaths.com") {
    return 301 https://automationpaths.com$redirect_path$is_args$args;
  }

  if ($uri ~ "^(.+)/+$") {
    return 301 https://automationpaths.com$redirect_path$is_args$args;
  }

  root /usr/share/nginx/html;
  index index.html;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /index.html {
    return 301 https://automationpaths.com;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
